services:
  - type: web
    name: queuestorm-investigator
    runtime: python
    plan: free
    region: oregon
    branch: fix/issues
    rootDir: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: PYTHON_VERSION
        value: "3.11.10"
